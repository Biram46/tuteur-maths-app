<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suites Numériques — Explorateur Interactif</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #06b6d4;
            --bg: #020617;
            --card: #0f172a;
            --card2: #1e293b;
            --border: rgba(124,58,237,0.25);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --green: #34d399;
            --red: #f87171;
            --yellow: #fbbf24;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            padding: 1.5rem 1rem;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: var(--primary-light);
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            letter-spacing: 0.15rem;
            margin-bottom: 1.5rem;
        }
        .container { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.2rem; }

        /* ── Type selector ── */
        .type-tabs { display: flex; gap: 0.5rem; background: var(--card); border-radius: 0.75rem; padding: 0.3rem; border: 1px solid var(--border); }
        .type-tab {
            flex: 1; padding: 0.65rem; border: none; border-radius: 0.5rem;
            background: transparent; color: var(--muted);
            font-family: 'Exo 2', sans-serif; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .type-tab.active { background: var(--primary); color: white; }

        /* ── Card ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.25rem;
        }
        .card-title {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em;
            color: var(--primary-light); font-weight: 700; margin-bottom: 1rem;
        }

        /* ── Formula display ── */
        .formula-display {
            background: var(--card2); border-radius: 0.75rem; padding: 1rem 1.5rem;
            text-align: center; border-left: 3px solid var(--primary);
            font-size: 1.1rem; min-height: 3rem; display: flex; align-items: center; justify-content: center;
        }

        /* ── Params grid ── */
        .params { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; }
        .param-group label { display: block; font-size: 0.7rem; color: var(--primary-light); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
        .param-group input[type=number], .param-group input[type=text] {
            width: 100%; background: var(--bg); border: 1px solid var(--card2);
            border-radius: 0.5rem; padding: 0.6rem 0.75rem; color: var(--text);
            font-family: 'Exo 2', sans-serif; font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .param-group input:focus { outline: none; border-color: var(--primary); }
        .param-group input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        /* ── Button ── */
        .btn {
            width: 100%; padding: 0.85rem; border: none; border-radius: 0.75rem;
            background: var(--primary); color: white; font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

        /* ── Terms table ── */
        .terms-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .terms-table th, .terms-table td { padding: 0.45rem 0.75rem; text-align: center; }
        .terms-table th { color: var(--primary-light); font-weight: 700; border-bottom: 1px solid var(--card2); }
        .terms-table td { border-bottom: 1px solid rgba(255,255,255,0.04); }
        .terms-table td.n-col { color: var(--muted); }
        .terms-table td.val-col { color: var(--text); font-weight: 600; }
        .terms-table tr:last-child td { border-bottom: none; }
        .scroll-x { overflow-x: auto; }

        /* ── Monotonie badge ── */
        .mono-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1rem; border-radius: 0.5rem; font-weight: 700; font-size: 0.9rem;
        }
        .mono-croissante { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
        .mono-decroissante { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
        .mono-constante { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
        .mono-alternee { background: rgba(6,182,212,0.12); color: var(--secondary); border: 1px solid rgba(6,182,212,0.3); }

        .mono-explication { margin-top: 0.75rem; font-size: 0.82rem; color: var(--muted); line-height: 1.6; }

        /* ── Canvas ── */
        canvas { display: block; width: 100%; border-radius: 0.5rem; background: var(--bg); }

        /* ── Error ── */
        .error { color: var(--red); font-size: 0.82rem; margin-top: 0.4rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<h1>Suites Numériques</h1>
<div class="container">

    <!-- Type de suite -->
    <div class="type-tabs">
        <button class="type-tab active" onclick="setType('arithmetique')">Suite arithmétique</button>
        <button class="type-tab" onclick="setType('geometrique')">Suite géométrique</button>
        <button class="type-tab" onclick="setType('recurrence')">Par récurrence</button>
        <button class="type-tab" onclick="setType('explicite')">Explicite f(n)</button>
    </div>

    <!-- Définition + paramètres -->
    <div class="card">
        <div class="card-title">Définition</div>
        <div class="formula-display" id="formula-display">u<sub>n</sub> = u<sub>0</sub> + n·r</div>

        <!-- Arithmétique -->
        <div id="params-arithmetique" class="params">
            <div class="param-group">
                <label>Premier terme u₀</label>
                <input type="number" id="arith-u0" value="2" step="0.5">
            </div>
            <div class="param-group">
                <label>Raison r</label>
                <input type="number" id="arith-r" value="3" step="0.5">
            </div>
            <div class="param-group">
                <label>Nombre de termes</label>
                <input type="range" id="arith-n" min="5" max="20" value="10" oninput="document.getElementById('arith-n-val').textContent=this.value">
                <span id="arith-n-val" style="font-size:0.8rem;color:var(--muted)">10</span>
            </div>
        </div>

        <!-- Géométrique -->
        <div id="params-geometrique" class="params hidden">
            <div class="param-group">
                <label>Premier terme u₀</label>
                <input type="number" id="geo-u0" value="1" step="0.5">
            </div>
            <div class="param-group">
                <label>Raison q</label>
                <input type="number" id="geo-q" value="2" step="0.25">
            </div>
            <div class="param-group">
                <label>Nombre de termes</label>
                <input type="range" id="geo-n" min="5" max="15" value="8" oninput="document.getElementById('geo-n-val').textContent=this.value">
                <span id="geo-n-val" style="font-size:0.8rem;color:var(--muted)">8</span>
            </div>
        </div>

        <!-- Récurrence -->
        <div id="params-recurrence" class="params hidden">
            <div class="param-group">
                <label>u₀ =</label>
                <input type="number" id="rec-u0" value="1" step="0.5">
            </div>
            <div class="param-group">
                <label>a (u_{n+1} = a·u_n + b)</label>
                <input type="number" id="rec-a" value="2" step="0.5">
            </div>
            <div class="param-group">
                <label>b</label>
                <input type="number" id="rec-b" value="3" step="0.5">
            </div>
            <div class="param-group">
                <label>Nombre de termes</label>
                <input type="range" id="rec-n" min="5" max="15" value="8" oninput="document.getElementById('rec-n-val').textContent=this.value">
                <span id="rec-n-val" style="font-size:0.8rem;color:var(--muted)">8</span>
            </div>
        </div>

        <!-- Explicite -->
        <div id="params-explicite" class="params hidden">
            <div class="param-group" style="grid-column:1/-1">
                <label>Expression de u_n en fonction de n (ex: n*n + 2*n - 1)</label>
                <input type="text" id="exp-fn" value="n*n + 1" placeholder="ex: 2*n + 1, n*n - 3, ...">
                <div class="error hidden" id="exp-error">Expression invalide</div>
            </div>
            <div class="param-group">
                <label>Début (n₀)</label>
                <input type="number" id="exp-n0" value="0" min="0" max="5" step="1">
            </div>
            <div class="param-group">
                <label>Nombre de termes</label>
                <input type="range" id="exp-n" min="5" max="20" value="10" oninput="document.getElementById('exp-n-val').textContent=this.value">
                <span id="exp-n-val" style="font-size:0.8rem;color:var(--muted)">10</span>
            </div>
        </div>

        <button class="btn" style="margin-top:1rem" onclick="compute()">Calculer</button>
    </div>

    <!-- Termes -->
    <div class="card" id="section-termes" style="display:none">
        <div class="card-title">Premiers termes</div>
        <div class="scroll-x"><table class="terms-table" id="terms-table"></table></div>
    </div>

    <!-- Monotonie -->
    <div class="card" id="section-mono" style="display:none">
        <div class="card-title">Variation</div>
        <div id="mono-result"></div>
        <div class="mono-explication" id="mono-explication"></div>
    </div>

    <!-- Graphique -->
    <div class="card" id="section-graph" style="display:none">
        <div class="card-title">Représentation graphique</div>
        <canvas id="graph-canvas" height="280"></canvas>
    </div>

</div>

<script>
let currentType = 'arithmetique';
let currentTerms = [];

function setType(type) {
    currentType = type;
    document.querySelectorAll('.type-tab').forEach((t, i) => {
        const types = ['arithmetique','geometrique','recurrence','explicite'];
        t.classList.toggle('active', types[i] === type);
    });
    ['arithmetique','geometrique','recurrence','explicite'].forEach(t => {
        document.getElementById('params-' + t).classList.toggle('hidden', t !== type);
    });
    updateFormula();
}

function updateFormula() {
    const el = document.getElementById('formula-display');
    const r = parseFloat(document.getElementById('arith-r')?.value) || 0;
    const u0a = parseFloat(document.getElementById('arith-u0')?.value) || 0;
    const q = parseFloat(document.getElementById('geo-q')?.value) || 1;
    const a = parseFloat(document.getElementById('rec-a')?.value) || 1;
    const b = parseFloat(document.getElementById('rec-b')?.value) || 0;
    const fn = document.getElementById('exp-fn')?.value || 'n';

    const bSign = b >= 0 ? `+ ${b}` : `− ${Math.abs(b)}`;
    const rSign = r >= 0 ? `+ ${r}` : `− ${Math.abs(r)}`;

    if (currentType === 'arithmetique') {
        el.innerHTML = `u<sub>n</sub> = u<sub>0</sub> + n·r &nbsp;=&nbsp; ${u0a} + n·(${r})`;
    } else if (currentType === 'geometrique') {
        el.innerHTML = `u<sub>n</sub> = u<sub>0</sub> · q<sup>n</sup> &nbsp;=&nbsp; ${parseFloat(document.getElementById('geo-u0')?.value)||1} · (${q})<sup>n</sup>`;
    } else if (currentType === 'recurrence') {
        el.innerHTML = `u<sub>n+1</sub> = ${a}·u<sub>n</sub> ${bSign} &nbsp;,&nbsp; u<sub>0</sub> = ${parseFloat(document.getElementById('rec-u0')?.value)||0}`;
    } else {
        el.innerHTML = `u<sub>n</sub> = ${fn}`;
    }
}

// Mettre à jour la formule en temps réel
document.querySelectorAll('input').forEach(inp => inp.addEventListener('input', updateFormula));

function safeEval(expr, n) {
    try {
        // Sécuriser l'évaluation
        const sanitized = expr.replace(/[^0-9n\+\-\*\/\.\(\)\s]/g, '');
        if (!sanitized.trim()) return NaN;
        // eslint-disable-next-line no-new-func
        return new Function('n', `"use strict"; return (${sanitized});`)(n);
    } catch { return NaN; }
}

function compute() {
    const terms = getTerms();
    if (!terms || terms.length === 0) return;
    currentTerms = terms;

    renderTermsTable(terms);
    renderMonotonie(terms);
    renderGraph(terms);

    document.getElementById('section-termes').style.display = '';
    document.getElementById('section-mono').style.display = '';
    document.getElementById('section-graph').style.display = '';
}

function getTerms() {
    if (currentType === 'arithmetique') {
        const u0 = parseFloat(document.getElementById('arith-u0').value);
        const r  = parseFloat(document.getElementById('arith-r').value);
        const n  = parseInt(document.getElementById('arith-n').value);
        return Array.from({length: n}, (_, i) => ({ n: i, v: u0 + i * r }));
    }
    if (currentType === 'geometrique') {
        const u0 = parseFloat(document.getElementById('geo-u0').value);
        const q  = parseFloat(document.getElementById('geo-q').value);
        const n  = parseInt(document.getElementById('geo-n').value);
        return Array.from({length: n}, (_, i) => ({ n: i, v: u0 * Math.pow(q, i) }));
    }
    if (currentType === 'recurrence') {
        const u0 = parseFloat(document.getElementById('rec-u0').value);
        const a  = parseFloat(document.getElementById('rec-a').value);
        const b  = parseFloat(document.getElementById('rec-b').value);
        const n  = parseInt(document.getElementById('rec-n').value);
        const terms = [{ n: 0, v: u0 }];
        for (let i = 1; i < n; i++) terms.push({ n: i, v: a * terms[i-1].v + b });
        return terms;
    }
    if (currentType === 'explicite') {
        const fn = document.getElementById('exp-fn').value;
        const n0 = parseInt(document.getElementById('exp-n0').value) || 0;
        const count = parseInt(document.getElementById('exp-n').value);
        const errEl = document.getElementById('exp-error');
        const terms = [];
        for (let i = n0; i < n0 + count; i++) {
            const v = safeEval(fn, i);
            if (isNaN(v) || !isFinite(v)) { errEl.classList.remove('hidden'); return null; }
            terms.push({ n: i, v });
        }
        errEl.classList.add('hidden');
        return terms;
    }
    return [];
}

function fmt(v) {
    if (Math.abs(v) > 1e6) return v.toExponential(2);
    return Math.round(v * 1000) / 1000;
}

function renderTermsTable(terms) {
    const tbl = document.getElementById('terms-table');
    const nRow = '<tr><th>n</th>' + terms.map(t => `<td class="n-col">${t.n}</td>`).join('') + '</tr>';
    const vRow = '<tr><th>u<sub>n</sub></th>' + terms.map(t => `<td class="val-col">${fmt(t.v)}</td>`).join('') + '</tr>';
    tbl.innerHTML = nRow + vRow;
}

function analyzeMono(terms) {
    if (terms.length < 2) return { type: 'constante', diffs: [] };
    const diffs = [];
    for (let i = 1; i < terms.length; i++) diffs.push(terms[i].v - terms[i-1].v);
    const allPos = diffs.every(d => d > 1e-9);
    const allNeg = diffs.every(d => d < -1e-9);
    const allZero = diffs.every(d => Math.abs(d) < 1e-9);
    if (allPos) return { type: 'croissante', diffs };
    if (allNeg) return { type: 'decroissante', diffs };
    if (allZero) return { type: 'constante', diffs };
    // Alternée ?
    const signs = diffs.map(d => d > 0 ? 1 : d < 0 ? -1 : 0);
    const alternee = signs.every((s, i) => i === 0 || s === -signs[i-1]);
    if (alternee) return { type: 'alternee', diffs };
    return { type: 'non-monotone', diffs };
}

function renderMonotonie(terms) {
    const { type, diffs } = analyzeMono(terms);
    const result = document.getElementById('mono-result');
    const explic = document.getElementById('mono-explication');

    const labels = {
        'croissante':    { icon: '↗', text: 'Strictement croissante', cls: 'mono-croissante' },
        'decroissante':  { icon: '↘', text: 'Strictement décroissante', cls: 'mono-decroissante' },
        'constante':     { icon: '→', text: 'Constante', cls: 'mono-constante' },
        'alternee':      { icon: '↕', text: 'Suite alternée', cls: 'mono-alternee' },
        'non-monotone':  { icon: '〰', text: 'Non monotone', cls: 'mono-constante' },
    };
    const lbl = labels[type];
    result.innerHTML = `<span class="mono-badge ${lbl.cls}">${lbl.icon} ${lbl.text}</span>`;

    // Explication selon le type
    let txt = '';
    if (currentType === 'arithmetique') {
        const r = parseFloat(document.getElementById('arith-r').value);
        txt = `Suite arithmétique de raison r = ${r}.<br>
        u<sub>n+1</sub> − u<sub>n</sub> = r = <strong>${r}</strong>
        ${r > 0 ? ' > 0 → suite <strong>croissante</strong>.' : r < 0 ? ' < 0 → suite <strong>décroissante</strong>.' : ' = 0 → suite <strong>constante</strong>.'}`;
    } else if (currentType === 'geometrique') {
        const q = parseFloat(document.getElementById('geo-q').value);
        const u0 = parseFloat(document.getElementById('geo-u0').value);
        txt = `Suite géométrique de raison q = ${q}, u₀ = ${u0}.<br>`;
        if (q > 1 && u0 > 0) txt += 'q > 1 et u₀ > 0 → suite <strong>croissante</strong>.';
        else if (0 < q && q < 1 && u0 > 0) txt += '0 < q < 1 et u₀ > 0 → suite <strong>décroissante</strong>.';
        else if (q < 0) txt += 'q < 0 → suite <strong>alternée</strong> (change de signe).';
        else if (q === 1) txt += 'q = 1 → suite <strong>constante</strong>.';
        else txt += 'u₀ = 0 → suite nulle.';
    } else if (currentType === 'recurrence') {
        const a = parseFloat(document.getElementById('rec-a').value);
        const b = parseFloat(document.getElementById('rec-b').value);
        const u0v = terms[0].v;
        const d0 = diffs[0];
        txt = `u<sub>n+1</sub> − u<sub>n</sub> = (${a}−1)·u<sub>n</sub> + ${b}<br>
        Pour u₀ = ${u0v} : u₁ − u₀ = ${fmt(d0)}
        → ${type === 'croissante' ? 'croissante' : type === 'decroissante' ? 'décroissante' : 'variation non constante'} sur les premiers termes.`;
    } else {
        const d0 = diffs[0];
        txt = `u<sub>n+1</sub> − u<sub>n</sub> commence à ${fmt(d0)}.
        La suite est <strong>${type}</strong> sur les termes calculés.`;
    }
    explic.innerHTML = txt;
}

function renderGraph(terms) {
    const canvas = document.getElementById('graph-canvas');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || 650;
    const H = 280;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const pad = { top: 24, right: 24, bottom: 36, left: 52 };
    const w = W - pad.left - pad.right;
    const h = H - pad.top - pad.bottom;

    const vals = terms.map(t => t.v);
    const ns   = terms.map(t => t.n);
    const minN = ns[0], maxN = ns[ns.length - 1];
    let minV = Math.min(...vals), maxV = Math.max(...vals);
    if (minV === maxV) { minV -= 1; maxV += 1; }
    const margin = (maxV - minV) * 0.15;
    minV -= margin; maxV += margin;

    const xS = n => pad.left + (n - minN) / (maxN - minN + 1) * w;
    const yS = v => pad.top + (1 - (v - minV) / (maxV - minV)) * h;

    // Fond
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, W, H);

    // Grille
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    const nLines = 5;
    for (let i = 0; i <= nLines; i++) {
        const y = pad.top + i * h / nLines;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
        const v = maxV - i * (maxV - minV) / nLines;
        ctx.fillStyle = '#64748b'; ctx.font = '10px Exo 2, sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(fmt(v), pad.left - 6, y + 4);
    }

    // Axe X
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    const y0 = yS(0);
    const yAxis = y0 < pad.top ? pad.top : y0 > pad.top + h ? pad.top + h : y0;
    ctx.beginPath(); ctx.moveTo(pad.left, yAxis); ctx.lineTo(pad.left + w, yAxis); ctx.stroke();

    // Labels n
    ctx.fillStyle = '#64748b'; ctx.font = '10px Exo 2, sans-serif'; ctx.textAlign = 'center';
    terms.forEach(t => {
        ctx.fillText(`n=${t.n}`, xS(t.n) + w / (maxN - minN + 1) / 2, pad.top + h + 16);
    });

    // Lignes verticales pointillées vers l'axe
    ctx.setLineDash([3, 4]);
    ctx.strokeStyle = 'rgba(167,139,250,0.2)';
    ctx.lineWidth = 1;
    terms.forEach(t => {
        const x = xS(t.n) + w / (maxN - minN + 1) / 2;
        ctx.beginPath(); ctx.moveTo(x, yAxis); ctx.lineTo(x, yS(t.v)); ctx.stroke();
    });
    ctx.setLineDash([]);

    // Points
    terms.forEach((t, i) => {
        const x = xS(t.n) + w / (maxN - minN + 1) / 2;
        const y = yS(t.v);

        // Halo
        const grad = ctx.createRadialGradient(x, y, 0, x, y, 10);
        grad.addColorStop(0, 'rgba(167,139,250,0.3)');
        grad.addColorStop(1, 'rgba(167,139,250,0)');
        ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();

        // Point
        ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#a78bfa'; ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.stroke();

        // Valeur au dessus
        if (terms.length <= 12) {
            ctx.fillStyle = '#c4b5fd'; ctx.font = '9px Exo 2, sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(fmt(t.v), x, y - 10);
        }
    });
}

// Init
updateFormula();
window.addEventListener('resize', () => { if (currentTerms.length) renderGraph(currentTerms); });
</script>
</body>
